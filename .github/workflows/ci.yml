name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres real para exercitar o backend + as migrations (senão as 14 parity
    # tests pulariam e o Postgres ficaria não-validado no CI).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
          POSTGRES_DB: monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monitor -d monitor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+psycopg://monitor:monitor@localhost:5432/monitor
      TEST_DATABASE_URL: postgresql+psycopg://monitor:monitor@localhost:5432/monitor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Prova que as migrations sobem um schema do zero (0001 -> head).
      - name: Apply migrations (alembic upgrade head)
        run: python -m alembic upgrade head

      # Guarda REAL de drift: falha se os modelos (sql_models.py) divergirem das
      # migrations — ex.: coluna nova no modelo sem migration correspondente.
      - name: Check migration drift (alembic check)
        run: python -m alembic check

      - name: Run tests
        run: python -m pytest -q
